<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%" height="100%">
  <style>
    /* CSS Animations and Styles */
    .bg {
      fill: #0B0F19;
    }
    .grid-line {
      stroke: #1E293B;
      stroke-width: 0.5;
      opacity: 0.4;
    }
    .title {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-weight: 800;
      fill: #F8FAFC;
      font-size: 38px;
      letter-spacing: 3px;
    }
    .subtitle {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-weight: 500;
      fill: #38BDF8;
      font-size: 13px;
      letter-spacing: 5px;
    }
    .connection {
      fill: none;
      stroke: #334155;
      stroke-width: 2;
      stroke-dasharray: 6, 6;
      animation: dash 25s linear infinite;
    }
    .recurrent-loop {
      fill: none;
      stroke: #818CF8;
      stroke-width: 2.5;
      stroke-dasharray: 8, 80;
      animation: flow 3s linear infinite;
    }
    .node {
      fill: #0B0F19;
      stroke: #38BDF8;
      stroke-width: 2.5;
    }
    .node-purple {
      stroke: #C084FC;
    }
    .pulse {
      fill: none;
      stroke: #38BDF8;
      stroke-width: 1.5;
      transform-origin: center;
      transform-box: fill-box;
      animation: pulse-animation 3s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite;
    }
    .pulse-purple {
      stroke: #C084FC;
      animation-delay: 1.5s;
    }

    @keyframes dash {
      to {
        stroke-dashoffset: -1000;
      }
    }
    @keyframes flow {
      to {
        stroke-dashoffset: -88;
      }
    }
    @keyframes pulse-animation {
      0% {
        transform: scale(0.8);
        opacity: 1;
      }
      100% {
        transform: scale(2.8);
        opacity: 0;
      }
    }
  </style>

  <!-- Background Card -->
  <rect class="bg" width="800" height="240" rx="16" />

  <!-- Grid Lines -->
  <g>
    <!-- Horizontal -->
    <line class="grid-line" x1="0" y1="40" x2="800" y2="40" />
    <line class="grid-line" x1="0" y1="80" x2="800" y2="80" />
    <line class="grid-line" x1="0" y1="120" x2="800" y2="120" />
    <line class="grid-line" x1="0" y1="160" x2="800" y2="160" />
    <line class="grid-line" x1="0" y1="200" x2="800" y2="200" />
    <!-- Vertical -->
    <line class="grid-line" x1="100" y1="0" x2="100" y2="240" />
    <line class="grid-line" x1="200" y1="0" x2="200" y2="240" />
    <line class="grid-line" x1="300" y1="0" x2="300" y2="240" />
    <line class="grid-line" x1="400" y1="0" x2="400" y2="240" />
    <line class="grid-line" x1="500" y1="0" x2="500" y2="240" />
    <line class="grid-line" x1="600" y1="0" x2="600" y2="240" />
    <line class="grid-line" x1="700" y1="0" x2="700" y2="240" />
  </g>

  <!-- Brand Typography -->
  <g transform="translate(60, 115)">
    <text class="title" x="0" y="0">AWESOME RNNs</text>
    <text class="subtitle" x="3" y="32">RECURRENT NEURAL NETWORKS</text>
  </g>

  <!-- Neural Network Visual (Centered in right half) -->
  <g transform="translate(430, 0)">
    <!-- Connections (Dashed lines) -->
    <line class="connection" x1="100" y1="120" x2="200" y2="70" />
    <line class="connection" x1="100" y1="120" x2="200" y2="170" />
    <line class="connection" x1="200" y1="70" x2="300" y2="120" />
    <line class="connection" x1="200" y1="170" x2="300" y2="120" />

    <!-- Recurrent self-loops (curves) -->
    <path class="recurrent-loop" d="M 200,70 C 160,30 240,30 200,70" />
    <path class="recurrent-loop" d="M 200,170 C 160,210 240,210 200,170" />

    <!-- Pulse Rings (Scaling animation) -->
    <g transform="translate(200, 70)">
      <circle class="pulse" cx="0" cy="0" r="12" />
      <circle class="pulse pulse-purple" cx="0" cy="0" r="12" />
    </g>
    <g transform="translate(200, 170)">
      <circle class="pulse" cx="0" cy="0" r="12" />
      <circle class="pulse pulse-purple" cx="0" cy="0" r="12" />
    </g>

    <!-- Node Circles -->
    <!-- Input Node -->
    <circle class="node" cx="100" cy="120" r="10" />
    <!-- Hidden Node 1 -->
    <circle class="node node-purple" cx="200" cy="70" r="12" />
    <!-- Hidden Node 2 -->
    <circle class="node node-purple" cx="200" cy="170" r="12" />
    <!-- Output Node -->
    <circle class="node" cx="300" cy="120" r="10" />

    <!-- Node Labels -->
    <text x="100" y="148" font-family="sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">Input x</text>
    <text x="200" y="44" font-family="sans-serif" font-size="11" fill="#C084FC" font-weight="bold" text-anchor="middle">h_t</text>
    <text x="300" y="148" font-family="sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">Output y</text>
  </g>
</svg>
